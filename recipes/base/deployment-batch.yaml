apiVersion: apps/v1
kind: Deployment
metadata:
  name: highperfasr-batch
  labels:
    app: highperfasr-batch
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: highperfasr-batch
  template:
    metadata:
      labels:
        app: highperfasr-batch
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: highperfasr-batch
          image: ghcr.io/beastoin/highperfasr-batch:latest
          imagePullPolicy: IfNotPresent
          args: ["serve", "--config", "/app/configs/serving-batch.yaml"]
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
            - name: HF_HOME
              value: "/model-cache"
            - name: NUMBA_CACHE_DIR
              value: "/tmp/numba_cache"
          resources:
            requests:
              cpu: "2"
              memory: "6Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: "8Gi"
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: model-cache
              mountPath: /model-cache
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: highperfasr-batch-model-cache
        - name: tmp
          emptyDir:
            sizeLimit: 2Gi
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
