# highperfasr — Streaming Only (T4 16GB)
#
# T4 has 16 GB VRAM vs 24 GB on L4.
# Max concurrent streams reduced from 512 to 256
# to fit within T4 VRAM budget.
mode: stream

server:
  host: "0.0.0.0"
  port: 8000
  workers: 1

stream_model:
  name: "nvidia/nemotron-3.5-asr-streaming-0.6b"
  device: "cuda:0"
  compile: false
  amp: true
  latency_mode: "480ms"
  source_language: "English"

stream:
  max_concurrent_streams: 256
  chunk_duration_ms: 160
  sample_rate: 16000
  max_stream_duration: 0
  idle_timeout: 300
  max_chunk_bytes: 524288
  max_stream_drain: 16
