apiVersion: v1
kind: ConfigMap
metadata:
  name: highperfasr-t4-configs
data:
  serving-batch.yaml: |
    # highperfasr — Batch Only (T4 16GB)
    # torch.compile and CUDA graphs disabled for Turing architecture
    mode: batch
    server:
      host: "0.0.0.0"
      port: 8000
      workers: 1
    batch_model:
      name: "nvidia/parakeet-tdt-0.6b-v3"
      device: "cuda:0"
      attention_mode: "auto"
      auto_local_attn_threshold_sec: 300
      local_attn_context: [128, 128]
      max_file_duration_sec: 3600
      compile: false
      amp: true
      cuda_graphs: false
    batcher:
      max_batch_size: 16
      max_wait_seconds: 0.002
      max_queue_depth: 4096
      max_upload_bytes: 536870912
      vram_safety_factor: 0.7
      vram_bytes_per_t2: 136.6
      starvation_timeout_sec: 5.0
      max_inflight: 2
  serving-stream.yaml: |
    # highperfasr — Streaming Only (T4 16GB)
    # Max concurrent streams reduced to 256 for T4 VRAM budget
    mode: stream
    server:
      host: "0.0.0.0"
      port: 8000
      workers: 1
    stream_model:
      name: "nvidia/nemotron-3.5-asr-streaming-0.6b"
      device: "cuda:0"
      compile: false
      amp: true
      latency_mode: "480ms"
      source_language: "English"
    stream:
      max_concurrent_streams: 256
      chunk_duration_ms: 160
      sample_rate: 16000
      max_stream_duration: 0
      idle_timeout: 300
      max_chunk_bytes: 524288
      max_stream_drain: 16
