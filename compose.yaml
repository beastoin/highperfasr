# HighPerfASR — one-command GPU ASR serving.
#
# Default (1 GPU):   docker compose up -d            (stream only, :8001)
# Both (2 GPUs):     docker compose --profile full up -d  (batch :8000 + stream :8001)
# Batch only:        docker compose up -d batch
# Logs:              docker compose logs -f
# Stop:              docker compose down
#
# Prerequisites: Docker + NVIDIA Container Toolkit + GPU (>= 12 GB VRAM)
# First run downloads models from HuggingFace (~2 GB each). Cached in named volumes.

services:
  batch:
    profiles: ["full"]
    build:
      context: .
      target: batch
    image: highperfasr-batch:latest
    container_name: highperfasr-batch
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - model-cache-batch:/app/.cache/huggingface
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_HOME=/app/.cache/huggingface
      - NUMBA_CACHE_DIR=/tmp/numba_cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  stream:
    build:
      context: .
      target: stream
    image: highperfasr-stream:latest
    container_name: highperfasr-stream
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - model-cache-stream:/app/.cache/huggingface
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_HOME=/app/.cache/huggingface
      - NUMBA_CACHE_DIR=/tmp/numba_cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

volumes:
  model-cache-batch:
  model-cache-stream:
