# highperfasr — Both Batch + Streaming (L4/A10/A100)
#
# Runs Parakeet TDT (batch) and Nemotron Streaming (real-time) on one GPU.
# VRAM: ~10 GB combined on L4 24GB.
mode: both

server:
  host: "0.0.0.0"
  port: 8000
  workers: 1

batch_model:
  name: "nvidia/parakeet-tdt-0.6b-v3"
  device: "cuda:0"
  attention_mode: "auto"
  auto_local_attn_threshold_sec: 300
  local_attn_context: [128, 128]
  max_file_duration_sec: 3600
  compile: true
  amp: true
  cuda_graphs: true

stream_model:
  name: "nvidia/nemotron-3.5-asr-streaming-0.6b"
  device: "cuda:0"
  compile: false
  amp: true
  latency_mode: "480ms"
  source_language: "English"

batcher:
  max_batch_size: 32
  max_wait_seconds: 0.002
  max_queue_depth: 4096
  max_upload_bytes: 536870912
  vram_safety_factor: 0.8
  vram_bytes_per_t2: 136.6
  starvation_timeout_sec: 5.0
  max_inflight: 2

stream:
  max_concurrent_streams: 512
  chunk_duration_ms: 160
  sample_rate: 16000
  max_stream_duration: 0
  idle_timeout: 300
  max_chunk_bytes: 524288
  max_stream_drain: 16
